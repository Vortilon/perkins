<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perkins – Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #ffffff;
      --sidebar-bg: #f7f7f8;
      --sidebar-w: 260px;
      --text: #0d0d0d;
      --muted: #6e6e80;
      --border: #e5e5e5;
      --btn: #0d0d0d;
      --btnHover: #2d2d2d;
      --userBubble: #0d0d0d;
      --userText: #ffffff;
      --assistantBubble: #f7f7f8;
      --red: rgb(192,0,0);
    }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      padding: 0 18px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
    }
    .sidebar-toggle {
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      color: var(--muted);
      font-size: 1.2rem;
      line-height: 1;
    }
    .sidebar-toggle:hover { background: var(--border); }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }
    .brand img.logo {
      height: 28px;
      width: auto;
    }
    .brand-name { font-weight: 600; font-size: 1rem; }
    .user-info {
      font-size: 0.9rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .user-info span { font-weight: 500; color: var(--text); }
    .topbar a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .topbar a:hover { color: var(--text); }

    /* ── BODY = SIDEBAR + MAIN ── */
    .shell {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: width 0.2s ease, padding 0.2s ease;
      overflow: hidden;
      flex-shrink: 0;
    }
    .sidebar.closed { width: 0; border-right: none; }
    .sidebar-header {
      padding: 14px 14px 10px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sidebar-header button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 4px 8px;
      color: var(--text);
    }
    .sidebar-header button:hover { background: var(--border); }
    .conv-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px;
    }
    .conv-item {
      padding: 9px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }
    .conv-item:hover { background: #ebebec; }
    .conv-item.active { background: #e3e3e5; font-weight: 500; }

    /* ── MAIN ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── MESSAGES ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 18px;
    }
    .welcome {
      text-align: center;
      padding: 80px 20px 20px;
      color: var(--muted);
    }
    .welcome h2 { font-size: 1.4rem; margin: 0 0 8px; color: var(--text); }
    .welcome p { font-size: 0.95rem; }
    .msg { display: flex; margin: 10px 0; }
    .msg.user { justify-content: flex-end; }
    .bubble {
      max-width: 860px;
      width: fit-content;
      border-radius: 14px;
      padding: 12px 16px;
      border: 1px solid var(--border);
      background: var(--assistantBubble);
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .msg.user .bubble {
      background: var(--userBubble);
      color: var(--userText);
      border-color: var(--userBubble);
      white-space: pre-wrap;
    }

    /* Analysis card */
    .analysis-card { display: grid; gap: 10px; }
    .card-section { display: grid; gap: 4px; }
    .card-label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
    }
    .card-value { font-size: 0.95rem; line-height: 1.5; color: var(--text); }
    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
    .tag {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 0.88rem;
      color: var(--text);
    }
    details.raw-json {
      margin-top: 10px;
      border: none;
      background: none;
      padding: 0;
    }
    details.raw-json summary {
      cursor: pointer;
      font-size: 0.82rem;
      color: var(--muted);
      list-style: none;
      font-weight: 500;
    }
    details.raw-json pre {
      background: #f4f4f5;
      border-radius: 8px;
      padding: 10px;
      font-size: 0.82rem;
      overflow-x: auto;
      margin-top: 6px;
    }

    /* ── COMPOSER ── */
    .composer {
      border-top: 1px solid var(--border);
      background: var(--bg);
      padding: 14px 18px 18px;
      flex-shrink: 0;
    }
    .composer-inner {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      gap: 10px;
    }
    details.mpd-panel {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
    }
    details.mpd-panel summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 500;
      list-style: none;
    }
    details.mpd-panel summary::-webkit-details-marker { display: none; }
    /* Drag-and-drop drop zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fafafa;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .drop-zone.dragover {
      border-color: #999;
      background: #f0f0f1;
    }
    .drop-zone.has-file { border-color: #aaa; background: #f4f4f5; }
    .drop-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: #e9e9eb;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      font-size: 1.2rem;
    }
    .drop-text { display: grid; gap: 2px; }
    .drop-title { font-size: 0.9rem; font-weight: 500; color: var(--text); }
    .drop-sub { font-size: 0.8rem; color: var(--muted); }
    input[type="file"] { display: none; }

    textarea {
      width: 100%;
      min-height: 86px;
      resize: vertical;
      padding: 12px;
      font-family: inherit;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
    }
    textarea:focus { border-color: #bdbdbd; }
    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .hint { color: var(--muted); font-size: 0.88rem; flex: 1; }
    .btn {
      background: var(--btn);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.95rem;
      font-family: inherit;
    }
    .btn:hover { background: var(--btnHover); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">☰</button>
    <div class="brand">
      <img class="logo" src="/static/dae-logo.jpg" alt="DAE" onerror="this.style.display='none'">
      <span class="brand-name">Perkins</span>
    </div>
    <div class="user-info">
      <span id="userName">…</span>
      <a href="/logout">Log out</a>
    </div>
  </div>

  <!-- BODY -->
  <div class="shell">

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        Conversations
        <button id="newConvBtn">+ New</button>
      </div>
      <div class="conv-list" id="convList"></div>
    </div>

    <!-- MAIN -->
    <div class="main">
      <div class="messages" id="messages">
        <div class="welcome" id="welcome">
          <h2>Welcome to Perkins</h2>
          <p>Upload a PDF, DOCX, XLSX or paste report text, then click Send.</p>
        </div>
      </div>

      <div class="composer">
        <div class="composer-inner">

          <details class="mpd-panel">
            <summary>MPD context (optional)</summary>
            <div style="margin-top:10px;">
              <textarea id="mpd" rows="3" placeholder="Paste MPD task/data, or leave blank."></textarea>
            </div>
          </details>

          <!-- Drag-and-drop zone -->
          <div class="drop-zone" id="dropZone">
            <div class="drop-icon">📄</div>
            <div class="drop-text">
              <div class="drop-title" id="dropTitle">Drop a file here or click to browse</div>
              <div class="drop-sub">PDF, DOCX, XLSX or TXT · max 25 MB</div>
            </div>
            <input type="file" id="fileInput" accept=".pdf,.docx,.xlsx,.txt">
          </div>

          <textarea id="input" placeholder="Or paste report text here…"></textarea>

          <div class="row">
            <span class="hint" id="status"></span>
            <button class="btn" id="sendBtn">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
/* ===== state ===== */
let currentConvId = null;
let me = null;

/* ===== helpers ===== */
const $ = id => document.getElementById(id);
async function api(url, opts = {}) {
  const r = await fetch(url, { credentials: 'same-origin', ...opts });
  if (r.status === 401) { location.href = '/login'; return null; }
  return r;
}

/* ===== load me ===== */
async function loadMe() {
  const r = await api('/me');
  if (!r || !r.ok) return;
  me = await r.json();
  $('userName').textContent = me.first_name + ' ' + me.last_name;
}

/* ===== sidebar ===== */
let sidebarOpen = true;
$('sidebarToggle').addEventListener('click', () => {
  sidebarOpen = !sidebarOpen;
  $('sidebar').classList.toggle('closed', !sidebarOpen);
});

async function loadConversations() {
  const r = await api('/conversations');
  if (!r || !r.ok) return;
  const convs = await r.json();
  const list = $('convList');
  list.innerHTML = '';
  for (const c of convs) {
    const el = document.createElement('div');
    el.className = 'conv-item' + (c.id === currentConvId ? ' active' : '');
    el.textContent = c.title;
    el.dataset.id = c.id;
    el.addEventListener('click', () => openConversation(c.id));
    list.appendChild(el);
  }
}

$('newConvBtn').addEventListener('click', async () => {
  const r = await api('/conversations', { method: 'POST' });
  if (!r || !r.ok) return;
  const c = await r.json();
  currentConvId = c.id;
  $('messages').innerHTML = '<div class="welcome" id="welcome"><h2>New conversation</h2><p>Paste text or upload a file to start.</p></div>';
  await loadConversations();
});

async function openConversation(id) {
  currentConvId = id;
  await loadConversations();
  const r = await api(`/conversations/${id}/messages`);
  if (!r || !r.ok) return;
  const msgs = await r.json();
  const el = $('messages');
  el.innerHTML = '';
  if (!msgs.length) {
    el.innerHTML = '<div class="welcome"><h2>Empty conversation</h2><p>Send a message to start.</p></div>';
  } else {
    for (const m of msgs) renderMessage(m.role, m.content, m.raw_json, false);
  }
  el.scrollTop = el.scrollHeight;
}

/* ===== message rendering ===== */
function renderMessage(role, content, rawJson, scroll = true) {
  const welcome = $('welcome');
  if (welcome) welcome.remove();

  const row = document.createElement('div');
  row.className = 'msg ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (role === 'assistant') {
    bubble.innerHTML = renderAnalysis(content, rawJson);
  } else {
    bubble.textContent = content;
  }

  row.appendChild(bubble);
  $('messages').appendChild(row);
  if (scroll) $('messages').scrollTop = $('messages').scrollHeight;
}

function renderAnalysis(content, rawJson) {
  let parsed = null;
  try { if (rawJson) parsed = JSON.parse(rawJson); } catch {}

  if (!parsed) {
    return `<div class="card-value" style="white-space:pre-wrap;">${esc(content)}</div>`;
  }

  const { discrepancies = [], driver = '', recommendations = [], compliance_notes = '', analysis = '' } = parsed;
  const parts = [];

  if (analysis) {
    parts.push(`<div class="card-section"><div class="card-label">Summary</div><div class="card-value" style="white-space:pre-wrap;">${esc(analysis)}</div></div>`);
  }
  if (discrepancies.length) {
    parts.push(`<div class="card-section"><div class="card-label">Discrepancies</div><div class="tag-list">${discrepancies.map(d => `<span class="tag">${esc(d)}</span>`).join('')}</div></div>`);
  }
  if (driver) {
    parts.push(`<div class="card-section"><div class="card-label">Driver / Cause</div><div class="card-value">${esc(driver)}</div></div>`);
  }
  if (recommendations.length) {
    parts.push(`<div class="card-section"><div class="card-label">Recommendations</div><div class="tag-list">${recommendations.map(r => `<span class="tag">${esc(r)}</span>`).join('')}</div></div>`);
  }
  if (compliance_notes) {
    parts.push(`<div class="card-section"><div class="card-label">Compliance</div><div class="card-value">${esc(compliance_notes)}</div></div>`);
  }

  const raw = `<details class="raw-json"><summary>▶ Show raw JSON</summary><pre>${esc(JSON.stringify(parsed, null, 2))}</pre></details>`;
  return `<div class="analysis-card">${parts.join('')}${raw}</div>`;
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ===== drag-and-drop ===== */
const dropZone = $('dropZone');
const fileInput = $('fileInput');
let pendingFile = null;

function setFile(f) {
  if (!f) return;
  pendingFile = f;
  $('dropTitle').textContent = `📎 ${f.name}`;
  dropZone.classList.add('has-file');
}

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  if (fileInput.files && fileInput.files[0]) setFile(fileInput.files[0]);
});
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files && e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
});

/* ===== ensure active conversation ===== */
async function ensureConversation() {
  if (currentConvId) return;
  const r = await api('/conversations', { method: 'POST' });
  if (!r || !r.ok) return;
  const c = await r.json();
  currentConvId = c.id;
}

/* ===== send ===== */
$('sendBtn').addEventListener('click', send);
$('input').addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') send();
});

async function send() {
  const text = ($('input').value || '').trim();
  const mpd = ($('mpd').value || '').trim();
  const file = pendingFile;

  if (!text && !file) { $('status').textContent = 'Type or upload a file first.'; return; }

  await ensureConversation();

  $('sendBtn').disabled = true;
  $('status').textContent = 'Analyzing…';

  const label = file ? `📎 ${file.name}` : text;
  renderMessage('user', label);

  const fd = new FormData();
  if (file) fd.append('file', file);
  if (text) fd.append('report_text', text);
  if (mpd) fd.append('mpd_context', mpd);

  // clear inputs
  $('input').value = '';
  pendingFile = null;
  fileInput.value = '';
  $('dropTitle').textContent = 'Drop a file here or click to browse';
  dropZone.classList.remove('has-file');

  try {
    const r = await api(`/conversations/${currentConvId}/analyze`, { method: 'POST', body: fd });
    if (!r) return;
    const data = await r.json();
    if (!r.ok) throw new Error(data.detail || r.statusText);
    renderMessage('assistant', data.analysis, JSON.stringify(data));
    $('status').textContent = '';
  } catch (e) {
    renderMessage('assistant', `Error: ${e.message || String(e)}`);
    $('status').textContent = e.message || String(e);
  }

  $('sendBtn').disabled = false;
  await loadConversations();
}

/* ===== init ===== */
(async () => {
  await loadMe();
  await loadConversations();
})();
</script>
</body>
</html>
