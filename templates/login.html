<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in – Perkins</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #ffffff;
      --text: #0d0d0d;
      --text-muted: #6e6e80;
      --border: #e5e5e5;
      --input-bg: #ffffff;
      --btn-bg: #0d0d0d;
      --btn-hover: #2d2d2d;
      --logo-red: rgb(192, 0, 0);
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
      --radius: 12px;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 400px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px 32px;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-placeholder {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--logo-red);
    }
    .logo img {
      max-height: 40px;
      width: auto;
      display: block;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0 0 8px 0;
      text-align: center;
    }
    .subtitle {
      font-size: 0.9375rem;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 28px;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    label {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
    }
    input {
      width: 100%;
      padding: 12px 14px;
      font-family: inherit;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text);
    }
    input:focus {
      outline: none;
      border-color: var(--text-muted);
    }
    input::placeholder {
      color: var(--text-muted);
    }
    button[type="submit"] {
      width: 100%;
      padding: 12px 16px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 500;
      color: #fff;
      background: var(--btn-bg);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
    }
    button[type="submit"]:hover {
      background: var(--btn-hover);
    }
    button[type="submit"]:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .error {
      font-size: 0.875rem;
      color: #c00;
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/static/dae-logo.jpg" alt="DAE" onerror="this.style.display='none';document.getElementById('dae-fallback').style.display='inline';">
      <span id="dae-fallback" class="logo-placeholder" aria-hidden="true" style="display:none;">DAE</span>
    </div>
    <h1>Welcome back</h1>
    <p class="subtitle">Log in to Perkins AI</p>
    <form method="post" action="/login" id="form">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username" required autofocus>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
      <button type="submit" id="btn">Log in</button>
    </form>
    <p class="error" id="error" role="alert" style="display: none;"></p>
  </div>
  <script>
    const form = document.getElementById('form');
    const errorEl = document.getElementById('error');
    const btn = document.getElementById('btn');
    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === 'auth') {
      errorEl.textContent = 'Invalid username or password. Try again.';
      errorEl.style.display = 'block';
    }
    form.addEventListener('submit', function() {
      btn.disabled = true;
    });
  </script>
</body>
</html>
